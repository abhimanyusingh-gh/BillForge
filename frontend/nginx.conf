server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SSE endpoint — disable buffering for real-time streaming.
  # Matches the nested-router shape `/api/tenants/:tenantId/jobs/ingest/sse`
  # (tenant-scoped, no `/clientOrgs/:clientOrgId` segment) introduced by the
  # #171 REST URL refactor. The `[^/]+` segment matches a single path
  # component so unrelated `/api/tenants/.../foo/jobs/ingest/sse` paths
  # don't accidentally inherit the SSE-tuned proxy directives.
  location ~ ^/api/tenants/[^/]+/jobs/ingest/sse$ {
    proxy_pass http://backend:4000;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  # Reverse proxy API, auth, and integration routes to the backend
  location /api/ {
    proxy_pass http://backend:4000;
    client_max_body_size 50m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }


  location /health {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — all other routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
