<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type · Display & headers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding: 16px 20px; font-family: var(--font-sans); }
  .row { display:flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 130px; font: 500 11px var(--font-mono); color: var(--ink-soft); }
  .ex { color: var(--ink); }
  .eyebrow { font: 800 11px var(--font-sans); text-transform: uppercase; letter-spacing: .10em; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="row"><span class="meta">22 / 700 · -1%</span><h1 class="ex" style="margin:0">Action Required</h1></div>
  <div class="row"><span class="meta">18 / 700</span><h2 class="ex" style="margin:0">Compliance summary</h2></div>
  <div class="row"><span class="meta">14 / 600</span><h3 class="ex" style="margin:0">Vendor & TDS section</h3></div>
  <div class="row"><span class="meta">11 / 800 · 10%</span><span class="eyebrow ex">Net payable</span></div>
</body>
</html>
