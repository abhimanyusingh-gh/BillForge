<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding: 14px 18px; font-family: var(--font-sans); }
  .row { display:flex; align-items: center; gap: 14px; padding: 5px 0; }
  .name { width: 60px; font: 600 11px var(--font-mono); color: var(--ink); }
  .px { width: 56px; font: 500 11px var(--font-mono); color: var(--ink-soft); }
  .bar { height: 12px; background: var(--accent); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="name">--sp-1</span><span class="px">4 px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="name">--sp-2</span><span class="px">8 px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="name">--sp-3</span><span class="px">12 px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="name">--sp-4</span><span class="px">16 px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="name">--sp-6</span><span class="px">24 px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="name">--sp-8</span><span class="px">32 px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="name">--sp-12</span><span class="px">48 px</span><span class="bar" style="width:48px"></span></div>
</body>
</html>
