<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Keyboard hints</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap: 14px; padding: 6px 0; }
  .lbl { width: 130px; font: 500 12px var(--font-sans); color: var(--ink); }
  .kbd { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height: 18px; padding: 0 6px; font: 600 11px var(--font-mono); background: var(--bg-sunken); color: var(--ink); border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 4px; }
  .sep { color: var(--ink-soft); font: 500 11px var(--font-sans); }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Walk queue</span><span class="kbd">J</span><span class="sep">/</span><span class="kbd">K</span></div>
  <div class="row"><span class="lbl">Approve</span><span class="kbd">A</span></div>
  <div class="row"><span class="lbl">Reject</span><span class="kbd">R</span></div>
  <div class="row"><span class="lbl">Export batch</span><span class="kbd">E</span></div>
  <div class="row"><span class="lbl">Switch realm</span><span class="kbd">⌘</span><span class="kbd">K</span></div>
  <div class="row"><span class="lbl">Shortcuts cheatsheet</span><span class="kbd">?</span></div>
</body>
</html>
