<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo · LedgerBuddy</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; background: var(--bg-panel); display:flex; align-items:center; justify-content:center; height: 150px; gap: 28px; padding: 0 24px; }
  .swatch { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .dark { background: #0b1120; padding: 14px 18px; border-radius: 10px; }
  .lbl { font: 500 11px var(--font-sans); color: var(--ink-soft); letter-spacing: .08em; text-transform: uppercase; }
  img.mark { width: 32px; height: 32px; }
  img.word { height: 28px; }
</style>
</head>
<body>
  <div class="swatch"><img class="mark" src="../assets/favicon.svg"/><span class="lbl">Mark</span></div>
  <div class="swatch"><img class="word" src="../assets/logo.svg"/><span class="lbl">Wordmark</span></div>
  <div class="swatch dark"><img class="word" src="../assets/logo.svg"/></div>
</body>
</html>
